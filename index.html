<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interview App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/new-login.css">
</head>
<body>
  <div class="login-container">
    <div class="login-form-section">
      <div class="form-container">
        <div class="form-header">
<h2>Welcome to Interview App</h2>
        <p>Sign in to start your interview preparation</p>
        </div>

        <form id="loginForm" class="auth-form">
          <div class="input-group">
            <label for="email">Email Address</label>
            <div class="input-wrapper">
              <span class="input-icon">✉️</span>
              <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>
          </div>

          <div class="input-group">
            <label for="password">Password</label>
            <div class="input-wrapper">
              <span class="input-icon">🔒</span>
              <input type="password" id="password" name="password" placeholder="Enter your password" required>
              <button type="button" class="toggle-password" onclick="togglePassword()">👁️</button>
            </div>
          </div>

          <div class="role-selection">
            <label>Login as</label>
            <div class="role-cards">
              <label class="role-card-new checked">
                <input type="radio" name="role" value="user" checked>
                <div class="role-content">
                  <span class="role-icon">👤</span>
                  <div class="role-info">
                    <span class="role-name">Candidate</span>
                    <span class="role-desc">Take tests</span>
                  </div>
                </div>
                <div class="check-mark">✓</div>
              </label>
              <label class="role-card-new">
                <input type="radio" name="role" value="admin">
                <div class="role-content">
                  <span class="role-icon">⚡</span>
                  <div class="role-info">
                    <span class="role-name">Admin</span>
                    <span class="role-desc">Manage all</span>
                  </div>
                </div>
                <div class="check-mark">✓</div>
              </label>
            </div>
          </div>

          <button type="submit" class="submit-btn">
            <span>Sign In</span>
            <span class="btn-arrow">→</span>
          </button>

          <p class="switch-auth">
            Don't have an account? <a href="#" onclick="showRegister()">Create one</a>
          </p>
        </form>

        <form id="registerForm" class="auth-form hidden">
          <div class="input-group">
            <label for="regName">Full Name</label>
            <div class="input-wrapper">
              <span class="input-icon">👤</span>
              <input type="text" id="regName" name="name" placeholder="Enter your full name" required>
            </div>
          </div>

          <div class="input-group">
            <label for="regEmail">Email Address</label>
            <div class="input-wrapper">
              <span class="input-icon">✉️</span>
              <input type="email" id="regEmail" name="email" placeholder="Enter your email" required>
            </div>
          </div>

          <div class="input-group">
            <label for="regPassword">Password</label>
            <div class="input-wrapper">
              <span class="input-icon">🔒</span>
              <input type="password" id="regPassword" name="password" placeholder="Create a password" required>
            </div>
          </div>

          <button type="submit" class="submit-btn">
            <span>Create Account</span>
            <span class="btn-arrow">✨</span>
          </button>

          <p class="switch-auth">
            Already have an account? <a href="#" onclick="showLogin()">Sign in</a>
          </p>
        </form>
      </div>

      <div class="form-footer">
        <p>© 2024 Interview App. All rights reserved.</p>
      </div>
    </div>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
